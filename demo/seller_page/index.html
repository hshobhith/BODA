<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> details </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="input">
            <form action="/action_page.php">
              <label for="sname">Store Name</label>
              <input type="text" id="sname" name="storename" placeholder="Enter Store name..">
          
              <label for="address">Address</label>
              <input type="text" id="address" name="address" placeholder="Enter the Address..">

              <label for="pin">Pin code</label>
              <input type="number" id="pin" name="pincode" placeholder="Enter the Pin Code..">
          
              <label for="category">Category</label>
              <select id="category" name="category">
                <option value="department">Department Store</option>
                <option value="grocery">Grocery Store</option>
                <option value="restaurants">Restaurants</option>
                <option value="clothing">Clothing Store</option>
                <option value="accessory">Accessory Store</option>
                <option value="pharmacies">Pharmacies Store</option>
                <option value="technology">Technology Store</option>
                <option value="pet">Pet Store</option>
                <option value="toy">Toy Store</option>
                <option value="speciality">Speciality Store</option>
                <option value="thrift">Thrift Store</option>
                <option value="hardware">Hardware Store</option>
              </select>
            
              <input type="submit" value="Submit">
            </form>
        </div>
    </div>
</body>
</html>
